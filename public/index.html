<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LumiTales</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div id="bookshelfScrim" class="bookshelf-scrim" hidden></div>
    <main class="reader-shell">
      <aside id="bookshelfPanel" class="bookshelf" aria-label="Bookshelf">
        <div class="bookshelf-heading">
          <h1>Bookshelf</h1>
          <p id="bookShelfCount"></p>
          <button id="bookshelfClose" class="bookshelf-close" type="button" aria-label="Close bookshelf">×</button>
        </div>
        <div id="bookShelf" class="book-grid" aria-live="polite"></div>
      </aside>

      <section class="stage" aria-label="Book page">
        <div class="image-frame">
          <button id="bookshelfToggle" class="bookshelf-toggle" type="button" aria-expanded="false" aria-controls="bookshelfPanel">Books</button>
          <div class="profile-control">
            <button id="profileToggle" class="profile-toggle" type="button" aria-expanded="false" aria-controls="profileMenu">Profile</button>
            <section id="profileMenu" class="profile-menu" aria-label="Profile" hidden>
              <p class="profile-label">Profile</p>
              <p id="accountName" class="profile-name">Signed in</p>
              <p id="accountEmail" class="profile-email"></p>
              <label class="profile-level" for="profileLevel">
                <span>Default reading level</span>
                <select id="profileLevel">
                  <option value="1">Level 1</option>
                  <option value="2">Level 2</option>
                  <option value="3">Level 3</option>
                  <option value="4">Level 4</option>
                  <option value="5">Level 5</option>
                </select>
              </label>
              <form id="logoutForm" action="/logout" method="post">
                <button type="submit">Sign out</button>
              </form>
            </section>
          </div>
          <div class="book-meta" tabindex="0" aria-label="Book information">
            <span class="book-meta-label">ⓘ</span>
            <div class="book-meta-details">
              <p id="bookTitle" class="book-title">Loading...</p>
              <p id="pageCount" class="page-count"></p>
            </div>
          </div>

          <img id="pageImage" alt="">

          <div class="playback-pane" aria-label="Page playback controls">
            <button id="prevButton" type="button" aria-label="Previous page">‹</button>
            <button id="playButton" type="button" aria-label="Play">▶</button>
            <button id="nextButton" type="button" aria-label="Next page">›</button>
            <div class="playback-options">
              <label class="playback-toggle">
                <input id="autoAdvance" type="checkbox" checked>
                Auto
              </label>
              <label class="playback-toggle">
                <input id="askQuestions" type="checkbox">
                Questions
              </label>
            </div>
            <p id="playbackStatus" role="status"></p>
          </div>
        </div>

        <audio id="audioPlayer" preload="auto"></audio>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
